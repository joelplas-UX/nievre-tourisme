[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Functions config
[functions]
  node_bundler = "esbuild"

# Scheduled scraper — elke donderdag 06:00 UTC
[functions."scrape-events"]
  schedule = "0 6 * * 4"

# Wekelijkse nieuwsbrief — elke donderdag 07:00 UTC (na scraping)
[functions."schedule-newsletter"]
  schedule = "0 7 * * 4"
